# Keyword lists for role scoring.
# Score = number of keywords that appear (case-insensitive substring) in
# title + org + summary + responsibilities + required_skills.
# Normalized to [0, 1] by dividing by the per-role max across the corpus.
# Add/remove keywords and re-run `make score` to retune.

